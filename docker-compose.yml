version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: ledgerbook-postgres
    environment:
      - POSTGRES_DB=ledgerbook
      - POSTGRES_USER=ledgerbook
      - POSTGRES_PASSWORD=ledgerbook_dev_password
    volumes:
      - ledgerbook-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerbook -d ledgerbook"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ledgerbook-backend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://ledgerbook:ledgerbook_dev_password@postgres:5432/ledgerbook
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET before running docker-compose}
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ledgerbook-frontend
    ports:
      - '5173:4173'
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  ledgerbook-postgres-data:
