version: '3.9'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ledgerbook-backend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_DIALECT=sqlite
      - DATABASE_STORAGE=/data/ledgerbook.sqlite
      - JWT_SECRET=supersecret
    volumes:
      - ./Backend:/app
      - ledgerbook-data:/data

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ledgerbook-frontend
    ports:
      - '5173:4173'
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  ledgerbook-data:
