services:
  - type: web
    name: ledgerbook-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerbook-db
          property: connectionString

databases:
  - name: ledgerbook-db
    plan: free
    region: oregon
    postgresMajorVersion: "17"
