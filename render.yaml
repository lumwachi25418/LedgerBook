services:
  - type: web
    name: ledgerbook-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd Backend && npm ci --omit=dev
    startCommand: cd Backend && npm run start:production
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerbook-db
          property: connectionString
      - key: DB_SSL
        value: "true"

databases:
  - name: ledgerbook-db
    plan: free
    region: oregon
    postgresMajorVersion: "17"
